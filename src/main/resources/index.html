<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jOllama UI</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="https://raw.githubusercontent.com/SergiJuan/jOllamaUI/main/jollamaui-logo.png" type="image/x-icon">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <!-- Logo -->
        <div class="logo">
            <img src="https://raw.githubusercontent.com/SergiJuan/jOllamaUI/main/jollamaui-logo.png" alt="jOllama">
            <span class="logo-text">jOllama UI</span>
        </div>

        <!-- Navigation Menu -->
        <nav class="nav-menu">
            <!-- Chat Button -->
            <button id="nav-chat" class="nav-btn active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                Chat
            </button>

            <!-- Models Button -->
            <button id="nav-models" class="nav-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <path d="M8 21h8M12 17v4"/>
                </svg>
                Models
            </button>

            <!-- Settings Button -->
            <button id="nav-settings" class="nav-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Settings
            </button>
        </nav>

        <!-- Connection Status -->
        <div class="sidebar-footer">
            <div class="conn-status">
                <div class="conn-dot" id="conn-dot"></div>
                <span id="conn-label">checking…</span>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">

        <!-- Chat View -->
        <div id="view-chat" class="view active">
            <!-- Header -->
            <div class="page-header">
                <span class="page-title">New conversation</span>
                <div class="flex flex-center gap-sm">
                    <select id="model-selector-chat">
                        <option value="">Loading…</option>
                    </select>
                    <button id="clear-chat" class="btn btn-ghost">Clear</button>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="chat-messages" class="chat-messages">
                <div class="message-row assistant">
                    <div class="message-avatar">AI</div>
                    <div class="message-bubble">Select a model above and start typing.</div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="chat-input-box">
                    <textarea id="chat-input" rows="1" placeholder="Write a message…"></textarea>
                    <div class="send-btn-wrap">
                        <button id="send-button" class="send-button">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <p class="chat-status" id="chat-status"></p>
            </div>
        </div>

        <!-- Models View -->
        <div id="view-models" class="view models-view">
            <!-- Header -->
            <div class="page-header">
                <span class="page-title">Installed models</span>
                <button id="refresh-models" class="btn btn-ghost">↻ Refresh</button>
            </div>

            <!-- Models Table -->
            <div class="models-body">
                <table class="models-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Size</th>
                            <th>Modified</th>
                            <th>Sel.</th>
                        </tr>
                    </thead>
                    <tbody id="models-table-body"></tbody>
                </table>
            </div>

            <!-- Pull Model Bar -->
            <div class="models-pull-bar">
                <div class="pull-field">
                    <label class="pull-label">DOWNLOAD MODEL</label>
                    <input id="pull-model-input" class="pull-input" type="text" placeholder="llama3, mistral, codellama…">
                </div>
                <button id="pull-model-btn" class="btn btn-primary">↓ Pull</button>
                <button id="delete-model-btn" class="btn btn-danger" disabled>✕ Delete</button>
            </div>

            <!-- Status Bar -->
            <div class="models-status-bar" id="models-status"></div>
        </div>

        <!-- Settings View -->
        <div id="view-settings" class="view settings-view">
            <!-- Header -->
            <div class="page-header">
                <span class="page-title">Settings</span>
            </div>

            <!-- Settings Form -->
            <div class="settings-inner">
                <div style="margin-bottom: 20px;">
                    <label class="settings-label">OLLAMA HOST</label>
                    <input id="settings-host" class="settings-input" type="url" value="http://localhost:11434">
                    <p class="settings-hint">Clients are reinitialized on save.</p>
                </div>

                <hr class="settings-divider">

                <div class="settings-footer">
                    <button id="save-settings" class="btn btn-primary">Save</button>
                    <span id="settings-status" class="settings-status"></span>
                </div>
            </div>
        </div>

    </main>

    <!-- Application JavaScript -->
    <script src="/js/app.js"></script>
</body>
</html>
